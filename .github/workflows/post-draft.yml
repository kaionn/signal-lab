name: Post Draft

on:
  push:
    branches: [main]
    paths:
      - "experiments/**/meta.yaml"
  workflow_dispatch:
    inputs:
      slug:
        description: "対象 Probe の slug"
        required: true
        type: string

permissions:
  contents: read

jobs:
  post-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Resolve target slugs
        id: slugs
        env:
          DISPATCH_SLUG: ${{ github.event.inputs.slug }}
        run: |
          set -euo pipefail
          if [ -n "${DISPATCH_SLUG:-}" ]; then
            echo "slugs=$DISPATCH_SLUG" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          SLUGS=$(git diff --name-only HEAD^ HEAD | grep -E '^experiments/.*/meta\.yaml$' \
            | sed -E 's#^experiments/([^/]+)/meta\.yaml$#\1#' \
            | grep -v '^_' \
            | sort -u \
            | tr '\n' ' ' || true)

          echo "slugs=$SLUGS" >> "$GITHUB_OUTPUT"
          echo "resolved slugs: $SLUGS"

      - name: Install Claude Code
        if: steps.slugs.outputs.slugs != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate and post drafts
        if: steps.slugs.outputs.slugs != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLUGS: ${{ steps.slugs.outputs.slugs }}
        run: |
          set -euo pipefail
          for SLUG in $SLUGS; do
            echo "::group::$SLUG"
            URL="https://signal-lab-six.vercel.app/p/$SLUG"
            SCREENSHOT="/tmp/probe-shot-$SLUG.png"

            READY=0
            for i in $(seq 1 20); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
              if [ "$STATUS" = "200" ]; then
                READY=1
                break
              fi
              echo "waiting for deploy ($SLUG): status=$STATUS (attempt $i)"
              sleep 15
            done

            if [ "$READY" = "1" ]; then
              npm i --no-save playwright
              npx playwright install --with-deps chromium
              node scripts/probe-screenshot.mjs "$URL" "$SCREENSHOT" || echo "::warning::screenshot failed for $SLUG"
            else
              echo "::warning::deploy not ready in time for $SLUG, skipping screenshot"
            fi

            # 手動 dispatch は再生成の意図なので distribution 済みガードを外す
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              node scripts/post-draft.mjs "$SLUG" --force
            else
              node scripts/post-draft.mjs "$SLUG"
            fi
            echo "::endgroup::"
          done
