name: Probe Request

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'pain-collector の Issue 番号'
        required: true
        type: string
      source_repo:
        description: 'pain-collector のリポジトリ (owner/repo)'
        required: true
        type: string
      payload:
        description: 'ペイン情報 (JSON, base64)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  probe:
    if: github.actor == 'kaionn'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate caller
        env:
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
        run: |
          set -euo pipefail
          if [[ "$SOURCE_REPO" != kaionn/* ]]; then
            echo "::error::Unauthorized source repo: $SOURCE_REPO"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Decode payload and resolve slug
        id: payload
        env:
          PAYLOAD_B64: ${{ github.event.inputs.payload }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/probe
          echo "$PAYLOAD_B64" | base64 -d > /tmp/probe/payload.json

          RAW_SLUG=$(jq -r '.slug' /tmp/probe/payload.json)
          if ! [[ "$RAW_SLUG" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "::error::slug '$RAW_SLUG' is not kebab-case"
            exit 1
          fi

          SLUG="$RAW_SLUG"
          i=2
          while [ -d "experiments/$SLUG" ]; do
            SLUG="${RAW_SLUG}-${i}"
            i=$((i + 1))
          done

          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "✅ resolved slug: $SLUG (raw: $RAW_SLUG)"

      - name: Create probe branch
        env:
          SLUG: ${{ steps.payload.outputs.slug }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "probe/$SLUG"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate Probe with Claude Code
        id: run-claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          SLUG: ${{ steps.payload.outputs.slug }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
        run: |
          set -euo pipefail
          PROMPT="リポジトリの CLAUDE.md を読み、Probe の追加手順と規約に従ってください。

          pain-collector Issue #${ISSUE_NUMBER}（${SOURCE_REPO}）から送られてきたペイン情報が /tmp/probe/payload.json に JSON で保存されています。読み込んで使用してください。

          ## 作成対象

          1. experiments/${SLUG}/meta.yaml
             - slug: ${SLUG}（ディレクトリ名と必ず一致させる）
             - probe_type: B
             - status: live
             - cta: waitlist
             - pain_source.repo: ${SOURCE_REPO}
             - pain_source.issue: ${ISSUE_NUMBER}
             - pain_source.source_url: payload.json の source_url（null ならそのまま null）
             - price_hypothesis: payload.json の monetization（high/medium/low/free）から金額仮説を立てて文章化する

          2. app/p/${SLUG}/page.tsx
             - components/probe の Hero / PainQuote / PriceCard / WaitlistForm で構成する
             - PainQuote の quote は payload.json の pain 本文、sourceUrl は payload.json の source_url

          ## 制約

          - 新規作成は experiments/${SLUG}/ と app/p/${SLUG}/ の配下のみ。既存ファイルは変更しないこと
          - 作業完了後に必ず yarn lint && yarn build を自分で実行し、成功を確認してから終了すること"

          set +e
          claude -p "$PROMPT" \
            --dangerously-skip-permissions \
            --output-format text \
            --max-turns 40 \
            > /tmp/probe/claude.log 2>&1
          CLAUDE_EXIT=$?
          set -e

          echo "--- Claude Code output (last 50 lines) ---"
          tail -50 /tmp/probe/claude.log || true

          if [ "$CLAUDE_EXIT" -ne 0 ]; then
            echo "::warning::Claude Code exited with code $CLAUDE_EXIT"
          fi

      - name: Upload Claude Code log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-log
          path: /tmp/probe/claude.log
          if-no-files-found: ignore

      - name: Verify Probe files were created
        env:
          SLUG: ${{ steps.payload.outputs.slug }}
        run: |
          set -euo pipefail
          if [ ! -f "experiments/$SLUG/meta.yaml" ] || [ ! -f "app/p/$SLUG/page.tsx" ]; then
            echo "::error::Required Probe files were not generated (experiments/$SLUG/meta.yaml, app/p/$SLUG/page.tsx)"
            exit 1
          fi

      - name: Validate (lint + build)
        run: |
          set -euo pipefail
          yarn lint
          yarn build

      - name: Commit, push and create PR
        id: push-pr
        env:
          GH_TOKEN: ${{ github.token }}
          SLUG: ${{ steps.payload.outputs.slug }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
        run: |
          set -euo pipefail

          git add -A
          CHANGED=$(git diff --cached --name-only)
          DISALLOWED=$(echo "$CHANGED" | grep -v -E "^(experiments/$SLUG/|app/p/$SLUG/)" || true)
          if [ -n "$DISALLOWED" ]; then
            echo "::error::Claude Code modified files outside experiments/$SLUG/ and app/p/$SLUG/:"
            echo "$DISALLOWED"
            exit 1
          fi

          PAIN=$(jq -r '.pain' /tmp/probe/payload.json)
          SOURCE_URL=$(jq -r '.source_url // empty' /tmp/probe/payload.json)
          SOURCE_TITLE=$(jq -r '.source_title // empty' /tmp/probe/payload.json)

          if [ -n "$SOURCE_URL" ]; then
            SOURCE_LINE="- 出典: ${SOURCE_TITLE:-不明}（$SOURCE_URL）"
          else
            SOURCE_LINE="- 出典: 不明"
          fi

          git commit -m "Probe「$SLUG」を追加（pain-collector #${ISSUE_NUMBER} 由来）"
          git push -u origin "probe/$SLUG"

          PR_URL=$(gh pr create \
            --title "Probe: $SLUG" \
            --body "$(cat <<PR_BODY
          ## 概要

          pain-collector Issue #${ISSUE_NUMBER} から自動生成された Probe です。

          - ペイン: $PAIN
          $SOURCE_LINE
          - Source Issue: ${SOURCE_REPO}#${ISSUE_NUMBER}

          ## 判定

          集客後、週次ダイジェスト（scripts/weekly-digest.mjs）で KILL / WATCH / GRADUATE を判定します。

          ## 注意

          **merge = Vercel 自動デプロイ = 公開** です。レビュー後、公開してよいタイミングで merge してください。
          PR_BODY
          )" \
            --head "probe/$SLUG" \
            --base main)

          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Notify Discord (success)
        if: steps.push-pr.outputs.pr_url != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLUG: ${{ steps.payload.outputs.slug }}
          PR_URL: ${{ steps.push-pr.outputs.pr_url }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          MESSAGE="🧪 Probe PR ができたわ: ${PR_URL}（${SLUG}）"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$MESSAGE" '{content: $content}')" \
            || echo "::warning::Discord notification failed"

      - name: Report success to pain-collector
        if: steps.push-pr.outputs.pr_url != ''
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
          SLUG: ${{ steps.payload.outputs.slug }}
          PR_URL: ${{ steps.push-pr.outputs.pr_url }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::CROSS_REPO_PAT not set, skipping issue comment"
            exit 0
          fi
          gh issue comment "$ISSUE_NUMBER" --repo "$SOURCE_REPO" --body "## ✅ Probe 生成完了

          - PR: $PR_URL
          - slug: $SLUG

          判定は週次ダイジェストで通知します。マージ = 公開なので、内容を確認してからマージしてください。" \
            || echo "::warning::Failed to post issue comment"

      - name: Notify Discord (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLUG: ${{ steps.payload.outputs.slug }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MESSAGE="❌ Probe 生成失敗（${SLUG:-unknown}）: ${RUN_URL}"
          curl -sf -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$MESSAGE" '{content: $content}')" \
            || echo "::warning::Discord notification failed"

      - name: Report failure to pain-collector
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          SOURCE_REPO: ${{ github.event.inputs.source_repo }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::CROSS_REPO_PAT not set, skipping issue comment"
            exit 0
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "$ISSUE_NUMBER" --repo "$SOURCE_REPO" --body "## ❌ Probe 生成に失敗しました

          - ワークフローログ: $RUN_URL

          再実行する場合は \`/probe\` を再度実行してください。" \
            || echo "::warning::Failed to post issue comment"
